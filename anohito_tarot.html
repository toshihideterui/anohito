<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あの人の気持ち鑑定</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0d0520;
  color: #e8dcc0;
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}
#bgCanvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

.app {
  position: relative;
  z-index: 1;
  max-width: 440px;
  margin: 0 auto;
  padding: 0 16px 60px;
}

/* ヘッダー */
.header {
  text-align: center;
  padding: 52px 0 24px;
}
.header-en {
  font-family: 'Cinzel Decorative', cursive;
  font-size: 10px;
  letter-spacing: 4px;
  color: #7a6230;
  margin-bottom: 10px;
}
.header-title {
  font-size: 26px;
  font-weight: 700;
  color: #f0d080;
  letter-spacing: 4px;
  text-shadow: 0 0 30px rgba(201,168,76,0.5);
  margin-bottom: 8px;
}
.header-sub {
  font-size: 10px;
  letter-spacing: 3px;
  color: #7a7060;
}
.gold-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 14px 0;
}
.gold-divider::before,.gold-divider::after {
  content:''; flex:1; height:1px;
  background: linear-gradient(90deg,transparent,#7a6230,transparent);
}
.gold-divider span { color:#c9a84c; font-size:12px; }

/* フォームボックス */
.form-box {
  background: rgba(20,5,45,0.8);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 4px;
  padding: 28px 20px 24px;
  position: relative;
  backdrop-filter: blur(8px);
}
.form-box::before,.form-box::after,.form-box .c-bl,.form-box .c-br {
  content:''; position:absolute;
  width:14px; height:14px;
  border-color:#7a6230; border-style:solid;
}
.form-box::before { top:-1px;left:-1px; border-width:1px 0 0 1px; }
.form-box::after  { top:-1px;right:-1px; border-width:1px 1px 0 0; }
.form-box .c-bl   { bottom:-1px;left:-1px; border-width:0 0 1px 1px; }
.form-box .c-br   { bottom:-1px;right:-1px; border-width:0 1px 1px 0; }

.field { margin-bottom:16px; }
.field label {
  display:block; font-size:10px;
  letter-spacing:3px; color:#7a6230; margin-bottom:7px;
}
.field input {
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(201,168,76,0.2);
  border-radius:2px;
  color:#e8dcc0; padding:11px 14px;
  font-family:inherit; font-size:15px;
  outline:none; transition:border-color .3s;
}
.field input:focus { border-color:rgba(201,168,76,0.5); }
.field input::placeholder { color:#5a5040; }

/* カードエリア（フォーム内） */
.form-card-wrap {
  margin: 20px 0 20px;
  text-align: center;
}
.card-hint {
  font-size:10px; letter-spacing:3px;
  color:rgba(201,168,76,0.5);
  margin-bottom:14px;
  animation: fadeText 2s ease-in-out infinite;
}
@keyframes fadeText { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* カードめくり共通 */
.card-scene {
  width: 200px;
  height: 310px;
  margin: 0 auto;
  perspective: 1200px;
}
.card-flipper {
  width:100%; height:100%;
  position:relative;
  transform-style: preserve-3d;
  transition: transform 0.9s cubic-bezier(0.4,0,0.2,1);
}
.card-flipper.flipped { transform: rotateY(180deg); }

.card-face {
  position:absolute; inset:0;
  backface-visibility: hidden;
  border-radius:10px; overflow:hidden;
  box-shadow: 0 0 30px rgba(201,168,76,0.2), 0 10px 40px rgba(0,0,0,0.6);
}
.card-front img {
  width:100%; height:100%; object-fit:cover; border-radius:10px;
  display:block;
}
.card-back-face {
  transform: rotateY(180deg);
  background: linear-gradient(160deg,#1e0840,#2d1060,#160630);
  border: 1px solid rgba(201,168,76,0.5);
  display:flex; flex-direction:column;
  align-items:center; justify-content:space-between;
  padding:18px 14px 14px;
}
.card-back-face::before {
  content:''; position:absolute;
  inset:5px; border:1px solid rgba(201,168,76,0.2);
  border-radius:6px; pointer-events:none;
}
.cb-moon { font-size:30px; color:#c9a84c; }
.cb-guide { font-size:9px; letter-spacing:3px; color:#7a6230; }
.cb-msg-area {
  flex:1; display:flex;
  align-items:center; justify-content:center;
  padding:10px 6px;
}
.cb-msg {
  font-size:13px; font-weight:700;
  line-height:1.8; text-align:center;
  color:#e8dcc0;
}
.cb-arcana { text-align:center; }
.cb-arcana-emoji { font-size:26px; }
.cb-arcana-en {
  font-family:'Cinzel Decorative',cursive;
  font-size:7px; letter-spacing:1px; color:#c9a84c; margin-top:3px;
}
.cb-arcana-ja { font-size:8px; color:#7a6230; margin-top:2px; }

/* カードを引くボタン */
.invoke-btn {
  width:100%; padding:15px;
  background:transparent;
  border:1px solid rgba(201,168,76,0.5);
  color:#f0d080;
  font-family:inherit; font-size:14px;
  letter-spacing:4px; cursor:pointer;
  transition:all .3s; margin-top:4px;
}
.invoke-btn:hover {
  background:rgba(201,168,76,0.08);
  box-shadow:0 0 20px rgba(201,168,76,0.2);
}
.invoke-btn:disabled { opacity:0.5; cursor:not-allowed; }

/* ローディング（小さめ、カード下に表示） */
.loading-inline {
  display:none; text-align:center; padding:20px 0 0;
}
.loading-inline.show { display:block; }
.loading-inline .orb {
  width:40px; height:40px; margin:0 auto 12px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(201,168,76,0.8),rgba(106,26,154,0.5));
  animation:orbPulse 1.5s ease-in-out infinite;
}
@keyframes orbPulse {
  0%,100%{transform:scale(1);box-shadow:0 0 20px rgba(201,168,76,0.3)}
  50%{transform:scale(1.1);box-shadow:0 0 40px rgba(201,168,76,0.6)}
}
.loading-inline .lt {
  font-size:10px; letter-spacing:3px; color:#7a7060;
  animation:fadeText 1.5s ease-in-out infinite;
}

/* 結果エリア */
.result-area { display:none; margin-top:20px; }
.result-area.show { display:block; }

.result-box {
  background:rgba(20,5,45,0.85);
  border:1px solid rgba(201,168,76,0.25);
  border-radius:4px;
  padding:28px 20px 24px;
  margin-bottom:14px;
  backdrop-filter:blur(8px);
}
.result-moon-top { text-align:center; margin-bottom:18px; }
.result-moon-icon { font-size:34px; color:#c9a84c; display:block; margin-bottom:3px; }
.result-guide-label { font-size:10px; letter-spacing:3px; color:#7a6230; }

.result-message-area {
  text-align:center; padding:18px 0;
  border-top:1px solid rgba(201,168,76,0.15);
  border-bottom:1px solid rgba(201,168,76,0.15);
  margin-bottom:20px;
}
.result-message { font-size:18px; font-weight:700; line-height:1.9; color:#e8dcc0; }

.result-arcana {
  display:flex; align-items:center;
  gap:18px; justify-content:center; margin-bottom:22px;
}
.result-arcana-visual {
  width:68px; height:102px;
  border:1px solid rgba(201,168,76,0.4);
  border-radius:6px;
  background:rgba(201,168,76,0.05);
  display:flex; align-items:center; justify-content:center;
  font-size:34px; flex-shrink:0;
}
.result-arcana-visual.reversed { transform:rotate(180deg); }
.result-arcana-info { text-align:left; }
.reversed-badge {
  display:inline-block; font-size:9px; letter-spacing:1px;
  color:#e08080; border:1px solid rgba(224,128,128,0.4);
  padding:2px 7px; border-radius:2px; margin-bottom:5px;
}
.result-arcana-en {
  font-family:'Cinzel Decorative',cursive;
  font-size:9px; letter-spacing:1px; color:#c9a84c; margin-bottom:4px;
}
.result-arcana-ja { font-size:15px; font-weight:700; }

.love-fortune { text-align:center; }
.love-label {
  display:flex; align-items:center; gap:8px;
  justify-content:center; font-size:10px;
  letter-spacing:3px; color:#7a6230; margin-bottom:8px;
}
.love-label::before,.love-label::after {
  content:''; flex:1; height:1px; background:rgba(201,168,76,0.3);
}
.stars-row { font-size:26px; letter-spacing:4px; }

.again-btn {
  width:100%; padding:15px; background:transparent;
  border:1px solid rgba(201,168,76,0.4); color:#f0d080;
  font-family:inherit; font-size:14px; letter-spacing:4px;
  cursor:pointer; transition:all .3s; margin-bottom:10px;
}
.again-btn:hover { background:rgba(201,168,76,0.07); box-shadow:0 0 20px rgba(201,168,76,0.2); }

.history-link {
  display:block; text-align:center; color:#7a7060;
  font-size:12px; letter-spacing:2px; cursor:pointer;
  padding:8px; margin-bottom:20px; transition:color .3s;
}
.history-link:hover { color:#c9a84c; }

.stores-banner {
  background:rgba(201,168,76,0.06);
  border:1px solid rgba(201,168,76,0.3);
  border-radius:4px; padding:22px 18px; text-align:center;
}
.stores-banner p { font-size:12px; line-height:2; color:rgba(232,220,192,0.8); margin-bottom:14px; }
.stores-btn {
  display:inline-block;
  background:linear-gradient(135deg,#c9a84c,#a07030);
  border-radius:2px; padding:11px 28px;
  color:#1a0a00; font-weight:700; font-size:13px;
  letter-spacing:2px; text-decoration:none; transition:all .3s;
}
.stores-btn:hover { box-shadow:0 0 20px rgba(201,168,76,0.4); transform:translateY(-1px); }

/* グロー */
@keyframes cardGlow {
  0%{box-shadow:0 0 10px rgba(201,168,76,0.2);}
  50%{box-shadow:0 0 60px rgba(201,168,76,0.7),0 0 100px rgba(106,26,154,0.4);}
  100%{box-shadow:0 0 10px rgba(201,168,76,0.2);}
}
.glow-anim { animation:cardGlow 1s ease-in-out; }

/* 履歴モーダル */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(5,2,15,0.88); z-index:200;
  align-items:flex-end; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background:linear-gradient(160deg,#1e0840,#130530);
  border:1px solid rgba(201,168,76,0.3);
  border-radius:16px 16px 0 0;
  padding:24px 20px 48px; width:100%;
  max-width:440px; max-height:65vh; overflow-y:auto;
}
.modal-head {
  display:flex; align-items:center;
  justify-content:space-between; margin-bottom:18px;
}
.modal-title { font-size:13px; letter-spacing:3px; color:#c9a84c; }
.modal-close {
  background:none; border:none; color:#7a7060;
  font-size:18px; cursor:pointer; padding:4px 8px;
}
.history-item {
  border:1px solid rgba(201,168,76,0.15);
  border-radius:4px; padding:12px 14px;
  margin-bottom:10px; background:rgba(255,255,255,0.03);
}
.history-date { font-size:10px; color:#7a6230; margin-bottom:3px; }
.history-card { font-size:11px; color:#c9a84c; margin-bottom:3px; }
.history-msg { font-size:12px; color:#e8dcc0; line-height:1.7; }
.history-empty { text-align:center; color:#7a7060; font-size:12px; padding:40px 0; }
</style>
</head>
<body>

    <div class="header-en">TAROT READING</div>

  <div id="formSection">

        <label>✦ あなたのお名前</label>

// 背景
(function(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const stars = [];
  for(let i=0;i<120;i++){
    stars.push({
      x:Math.random(), y:Math.random(),
      r:Math.random()*1.5+0.3, speed:Math.random()*0.02+0.005,
      offset:Math.random()*Math.PI*2
    });
  }
  let frame = 0;
  function draw(){
    const W=canvas.width, H=canvas.height;
    const grd=ctx.createLinearGradient(0,0,0,H);
    grd.addColorStop(0,'#0d0520');
    grd.addColorStop(0.4,'#1a0840');
    grd.addColorStop(0.7,'#2d1060');
    grd.addColorStop(1,'#1a0535');
    ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
    const nGrd=ctx.createRadialGradient(W*0.3,H*0.3,0,W*0.3,H*0.3,W*0.4);
    nGrd.addColorStop(0,'rgba(120,40,180,0.1)');
    nGrd.addColorStop(1,'transparent');
    ctx.fillStyle=nGrd; ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{
      const alpha=(Math.sin(frame*s.speed+s.offset)+1)*0.35+0.1;
      ctx.globalAlpha=alpha;
      ctx.fillStyle='#f0e0ff';
      ctx.beginPath();
      ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha=1; frame++;
    requestAnimationFrame(draw);
  }
  draw();
})();

async function startDivination(){
  if(isLoading || isFlipped) return;
  const userName = document.getElementById('userName').value.trim();
  const targetName = document.getElementById('targetName').value.trim();
  if(!userName || !targetName){ alert('お名前を入力してください'); return; }

  isLoading = true;
  const btn = document.getElementById('invokeBtn');
  btn.disabled = true;
  btn.textContent = '✦ 占い中… ✦';
  document.getElementById('loadingInline').classList.add('show');
  document.getElementById('cardHint').style.display = 'none';

  const arcana = ARCANA[Math.floor(Math.random()*ARCANA.length)];
  const isReversed = Math.random() < 0.28;
  const stars = Math.floor(Math.random()*2)+3;

  let message = '';
  try {
    const prompt = `あなたはプロのタロット占い師です。
${userName}さんが気になる${targetName}さんの気持ちをタロットで鑑定しました。
カード：${arcana.ja}（${isReversed?'逆位置':'正位置'}）
恋愛の文脈で、${targetName}さんの${userName}さんへの気持ちを一言で表してください。
25〜40文字の自然な日本語で、ポジティブで温かい表現にしてください。
記号や「」は不要です。一文だけ返してください。`;

    const models = ['llama-3.3-70b-versatile','llama3-70b-8192','gemma2-9b-it'];
    for(const model of models){
      try {
        const res = await fetch(PROXY_URL,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({model,max_tokens:100,temperature:0.9,messages:[{role:'user',content:prompt}]})
        });
        const data = await res.json();
        if(res.ok && data.choices?.[0]?.message?.content){
          message = data.choices[0].message.content.trim().replace(/^[「『]|[」』]$/g,'');
          break;
        }
      } catch(e){ continue; }
    }
  } catch(e){}

  if(!message) message = getFallback(arcana, isReversed);

  currentResult = {userName,targetName,arcana,isReversed,stars,message,date:new Date()};

  // カード裏面にセット
  document.getElementById('cbMsg').textContent = message;
  document.getElementById('cbEmoji').textContent = arcana.emoji;
  document.getElementById('cbEn').textContent = arcana.en;
  document.getElementById('cbJa').textContent = arcana.ja;

  // ローディング非表示
  document.getElementById('loadingInline').classList.remove('show');
  isLoading = false;

  // カードをめくる
  const scene = document.getElementById('cardScene');
  scene.classList.add('glow-anim');
  document.getElementById('cardFlipper').classList.add('flipped');
  isFlipped = true;

  setTimeout(()=>{
    scene.classList.remove('glow-anim');
    // 結果詳細をセット
    document.getElementById('resultMessage').textContent = message;
    document.getElementById('resultArcanaVisual').textContent = arcana.emoji;
    document.getElementById('resultArcanaVisual').className = 'result-arcana-visual' + (isReversed?' reversed':'');
    document.getElementById('resultArcanaEn').textContent = arcana.en;
    document.getElementById('resultArcanaJa').textContent = arcana.ja;
    document.getElementById('reversedBadge').style.display = isReversed?'inline-block':'none';
    const filled='⭐'.repeat(stars), empty='☆'.repeat(5-stars);
    document.getElementById('starsRow').textContent = filled+empty;
    // 結果表示
    document.getElementById('resultArea').classList.add('show');
    saveHistory(currentResult);
    setTimeout(()=>{
      document.getElementById('resultArea').scrollIntoView({behavior:'smooth',block:'start'});
    }, 100);
  }, 1000);
}

function getFallback(arcana, isReversed){
  const msgs = isReversed ? [
    'あなたへの気持ちを整理しようとしています',
    '少し戸惑いがありますが、関心は持っています',
    '自分の気持ちに気づき始めています',
  ] : [
    'あなたのことを気になっていますが、まだ自信が持てないようです',
    '会いたい気持ちはありますが、今は様子を見ています',
    'あなたのことをもっと知りたいと思っています',
    'ゆっくりと心を開こうとしています',
    'あなたへの想いを大切に温めています',
  ];
  return msgs[Math.floor(Math.random()*msgs.length)];
}

function saveHistory(r){
  let h=[];
  try{ h=JSON.parse(localStorage.getItem('anohito_history')||'[]'); }catch(e){}
  h.unshift({
    date:r.date.toLocaleString('ja-JP'),
    card:`${r.arcana.ja}（${r.isReversed?'逆位置':'正位置'}）`,
    message:r.message, stars:r.stars
  });
  if(h.length>30) h.pop();
  try{ localStorage.setItem('anohito_history',JSON.stringify(h)); }catch(e){}
}

function resetAll(){
  isFlipped = false;
  isLoading = false;
  document.getElementById('cardFlipper').classList.remove('flipped');
  document.getElementById('resultArea').classList.remove('show');
  document.getElementById('cardHint').style.display = 'block';
  const btn = document.getElementById('invokeBtn');
  btn.disabled = false;
  btn.textContent = '✦ カードを引く ✦';
  document.getElementById('userName').value = '';
  document.getElementById('targetName').value = '';
  window.scrollTo({top:0,behavior:'smooth'});
}

function showHistory(){
  let h=[];
  try{ h=JSON.parse(localStorage.getItem('anohito_history')||'[]'); }catch(e){}
  const list=document.getElementById('historyList');
  if(h.length===0){
    list.innerHTML='<div class="history-empty">まだ鑑定履歴がありません</div>';
  } else {
    list.innerHTML=h.map(item=>`
      <div class="history-item">
        <div class="history-date">${item.date}</div>
        <div class="history-card">✦ ${item.card} ${'⭐'.repeat(item.stars)}${'☆'.repeat(5-item.stars)}</div>
        <div class="history-msg">${item.message}</div>
      </div>
    `).join('');
  }
  document.getElementById('historyModal').classList.add('show');
}
function hideHistory(){ document.getElementById('historyModal').classList.remove('show'); }
function closeModalOutside(e){ if(e.target===document.getElementById('historyModal')) hideHistory(); }
</script>
</body>
